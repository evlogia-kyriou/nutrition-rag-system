backends:
  llamacpp:
    model_path: "./models/Llama-3.2-1B-Instruct-Q4_K_M.gguf"
    context_window: 8192
    n_threads: 8
    n_gpu_layers: 0
    verbose: false
    use_mlock: true
    use_map: true

  vllm:
    model_name: "meta-llama/Llama-3.2-1B-Instruct"
    gpu_memory_util: 0.8
    context_window: 8192
    tensor_parallel: 1
    dtype: "auto"
    quantization: null

current_backend: "llamacpp"

generation:
  default:
    max_token: 512
    temperature: 0.7
    top_p: 0.9
    top_k: 40
    stop_sequences: -"User:"
      -"Human:"
      -"<|end|>"
      -"<|eot_id|>"

embedding:
  model: "sentence-transformer/all-MiniLm-L6-v2"
  device: "cpu"
  batch_size: 32
